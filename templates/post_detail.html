<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ post.title }} - The Journal</title>
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            background: "#faf9f6",
            secondary: "#79573f",
            outline: "#78776e",
            error: "#ba1a1a",
            "on-surface": "#1a1c1a",
            "on-surface-variant": "#47473f",
          },
          spacing: {
            "margin-page": "20px",
            "stack-lg": "32px",
            "stack-sm": "8px",
            "stack-md": "16px",
          },
          fontFamily: {
            headline: ["Epilogue"],
            body: ["Be Vietnam Pro"],
          },
        },
      },
    };
  </script>
</head>
<body class="bg-background text-on-surface font-body min-h-screen">
  <header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-5 h-16 bg-[#FAF9F6] border-b border-[#D2B48C]/20">
    <a href="{{ url_for('list_posts') }}" class="text-sm text-[#6F4E37]">목록</a>
    <h1 class="text-xl font-bold text-[#6F4E37] font-headline tracking-tight">The Journal</h1>
    <div></div>
  </header>

  <main class="pt-24 pb-16 px-margin-page max-w-3xl mx-auto">
    <article>
      <header class="mb-stack-lg border-b border-[#D2B48C]/30 pb-stack-md">
        <h2 class="font-headline text-4xl mb-stack-sm leading-tight">{{ post.title }}</h2>
        <time class="text-on-surface-variant text-sm">{{ post.created_at }}</time>
      </header>

      <section class="text-lg leading-relaxed whitespace-pre-wrap">{{ post.content }}</section>

      <div class="mt-16 flex flex-col sm:flex-row items-center justify-center gap-4">
        <a href="{{ url_for('edit_post', post_id=post.id) }}" class="w-full sm:w-auto px-10 py-3 rounded-full bg-secondary text-white font-semibold text-sm uppercase tracking-widest text-center">[수정]</a>

        <form action="{{ url_for('delete_post', post_id=post.id) }}" method="post" onsubmit="return confirm('정말 삭제할까요?');" class="w-full sm:w-auto">
          <button type="submit" class="w-full px-8 py-3 rounded-full border border-error/30 text-error font-semibold text-sm uppercase tracking-widest">[삭제]</button>
        </form>
      </div>
    </article>
  </main>
</body>
</html>
